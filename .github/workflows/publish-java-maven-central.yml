name: Publish Java Package to Maven Central

on:
  push:
    tags:
      - "v*" # 推送 v1.0.0 这类标签自动触发
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'edgecron/edgecron-java'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tag matches pom version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PROJECT_VERSION="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match pom.xml version ${PROJECT_VERSION}."
            exit 1
          fi

      - name: Validate release secrets
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          missing=0
          for name in CENTRAL_PORTAL_USERNAME CENTRAL_PORTAL_PASSWORD MAVEN_GPG_PRIVATE_KEY MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if ! printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
            echo "::error::MAVEN_GPG_PRIVATE_KEY does not look like an ASCII-armored PGP private key."
            exit 1
          fi
          echo "Release secrets are present."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
          # 固定配置，和你的 settings.xml 完全匹配
          server-id: central
          server-username: CENTRAL_PORTAL_USERNAME
          server-password: CENTRAL_PORTAL_PASSWORD
          # GPG 密钥配置
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: List imported GPG keys
        run: |
          gpg --batch --list-secret-keys --keyid-format LONG

      - name: Build and Publish to Maven Central
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn --batch-mode --no-transfer-progress -P release deploy -DskipTests
